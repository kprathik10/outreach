<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Enquiries</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f7f7f7;
padding:40px;
margin:0;
}

.login-box,
.dashboard{
max-width:1100px;
margin:auto;
background:#fff;
padding:28px;
border-radius:24px;
box-shadow:0 15px 30px rgba(0,0,0,.08);
overflow:hidden;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:14px;
}

button{
padding:14px 18px;
border:none;
border-radius:12px;
background:#e35a1a;
color:#fff;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:14px;
}

.table-wrap{
overflow-x:auto;
border-radius:18px;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
vertical-align:top;
}

th{
background:#fafafa;
}

.hidden{
display:none;
}

.top-tools{
display:flex;
gap:12px;
margin:18px 0 12px;
flex-wrap:wrap;
}

.top-tools input{
flex:1;
min-width:260px;
margin:0;
}

.top-tools button{
white-space:nowrap;
}

.filter-row input{
width:100%;
padding:8px 10px;
font-size:12px;
border:1px solid #ddd;
border-radius:8px;
margin:0;
}

.filter-row th{
background:#fff;
padding:8px;
}

table{
width:100%;
border-collapse:separate;
border-spacing:0;
margin-top:18px;
font-size:14px;
table-layout:fixed;
background:#fff;
border:1px solid #ececec;
border-radius:18px;
overflow:hidden;
}

th,td{
padding:14px 14px;
border-bottom:1px solid #f0f0f0;
text-align:left;
vertical-align:top;
word-break:break-word;
}

tbody tr:hover{
background:#fafafa;
}

.main-head th{
background:#f8f8f8;
font-weight:700;
font-size:14px;
cursor:pointer;
position:sticky;
top:0;
z-index:3;
user-select:none;
white-space:nowrap;
}

.main-head th:hover{
background:#f2f2f2;
}

th,td{
padding:10px;
border:1px solid #ececec;
text-align:left;
vertical-align:top;
word-break:break-word;
}

.filter-row th{
background:#ffffff;
padding:10px;
border-bottom:1px solid #ececec;
}

.filter-row input{
width:100%;
height:38px;
padding:0 12px;
font-size:13px;
border:1px solid #dddddd;
border-radius:10px;
background:#fafafa;
margin:0;
outline:none;
transition:.2s ease;
box-sizing:border-box;
}

.filter-row input:focus{
border-color:#e35a1a;
background:#fff;
box-shadow:0 0 0 3px rgba(227,90,26,.08);
}

</style>
</head>

<body>

<div class="login-box" id="loginBox">
<h2>Admin Access</h2>
<input type="password" id="pass" placeholder="Enter Passcode">
<button onclick="login()">Enter</button>
</div>

<div class="dashboard hidden" id="dashboard">
<h2>Enquiries Dashboard</h2>

<div class="top-tools">

<input type="text" id="searchBox" placeholder="Search enquiries..." onkeyup="filterRows()">

<button onclick="exportCSV()">Export CSV</button>

</div>

<div class="table-wrap">
<table id="dataTable">
<thead>

<tr class="main-head">
<th onclick="sortTable(0)">Date ⇅</th>
<th onclick="sortTable(1)">Name ⇅</th>
<th onclick="sortTable(2)">Company ⇅</th>
<th onclick="sortTable(3)">Email ⇅</th>
<th onclick="sortTable(4)">Phone ⇅</th>
<th onclick="sortTable(5)">Message ⇅</th>
</tr>

<tr class="filter-row">
<th><input onkeyup="filterTable()" data-col="0" placeholder="Filter"></th>
<th><input onkeyup="filterTable()" data-col="1" placeholder="Filter"></th>
<th><input onkeyup="filterTable()" data-col="2" placeholder="Filter"></th>
<th><input onkeyup="filterTable()" data-col="3" placeholder="Filter"></th>
<th><input onkeyup="filterTable()" data-col="4" placeholder="Filter"></th>
<th><input onkeyup="filterTable()" data-col="5" placeholder="Filter"></th>
</tr>

</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>
const PASSCODE = "outreach2026";
const API = "https://script.google.com/macros/s/AKfycbyfZPVkYcF8GAvQnV4cBrToJTvzmOOgteOjSNm2Aqpj2YrFECcaLu0N7HoIWmVPlIgk/exec";

function login(){
const val = document.getElementById("pass").value;

if(val === PASSCODE){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
loadData();
}else{
alert("Wrong passcode");
}
}

let cachedRows = [];

function loadData(){

document.querySelector("#dataTable tbody").innerHTML =
"<tr><td colspan='6'>Loading...</td></tr>";
    
fetch(API)
.then(r => r.json())
.then(rows => {

cachedRows = rows.reverse();

renderRows(cachedRows);

});

}
function filterTable(){

const filters = document.querySelectorAll(".filter-row input");

const filtered = cachedRows.filter(row => {

for(let i=0;i<filters.length;i++){

const val = filters[i].value.toLowerCase().trim();

if(val){

const cell = (row[i] || "").toString().toLowerCase();

if(!cell.includes(val)){
return false;
}

}

}

return true;

});

renderRows(filtered);

}

function exportCSV(){

let csv = [];

const rows = document.querySelectorAll("#dataTable tr");

rows.forEach(row => {

let cols = row.querySelectorAll("th, td");
let data = [];

cols.forEach(col => {
data.push('"' + col.innerText.replace(/"/g,'""') + '"');
});

csv.push(data.join(","));

});

const blob = new Blob(
[csv.join("\n")],
{ type:"text/csv" }
);

const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;
a.download = "enquiries.csv";
a.click();

window.URL.revokeObjectURL(url);

}

function renderRows(rows){

const body = document.querySelector("#dataTable tbody");

let html = "";

rows.forEach(row => {

html += `
<tr>
<td>${row[0] || ""}</td>
<td>${row[1] || ""}</td>
<td>${row[2] || ""}</td>
<td>${row[3] || ""}</td>
<td>${row[4] || ""}</td>
<td>${row[5] || ""}</td>
</tr>
`;

});

body.innerHTML = html;

}

let sortDirection = {};

function sortTable(col){

sortDirection[col] = !sortDirection[col];

cachedRows.sort((a,b)=>{

let x = (a[col] || "").toString().toLowerCase();
let y = (b[col] || "").toString().toLowerCase();

if(x < y) return sortDirection[col] ? -1 : 1;
if(x > y) return sortDirection[col] ? 1 : -1;
return 0;

});

renderRows(cachedRows);

}
</script>

</body>
</html>
