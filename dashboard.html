<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Enquiries</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f7f7f7;
padding:40px;
margin:0;
}

.login-box,
.dashboard{
max-width:1100px;
margin:auto;
background:#fff;
padding:28px;
border-radius:24px;
box-shadow:0 15px 30px rgba(0,0,0,.08);
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:14px;
}

button{
padding:14px 18px;
border:none;
border-radius:12px;
background:#e35a1a;
color:#fff;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:14px;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
vertical-align:top;
}

th{
background:#fafafa;
}

.hidden{
display:none;
}

.top-tools{
display:flex;
gap:12px;
margin:18px 0 12px;
flex-wrap:wrap;
}

.top-tools input{
flex:1;
min-width:260px;
margin:0;
}

.top-tools button{
white-space:nowrap;
}

</style>
</head>

<body>

<div class="login-box" id="loginBox">
<h2>Admin Access</h2>
<input type="password" id="pass" placeholder="Enter Passcode">
<button onclick="login()">Enter</button>
</div>

<div class="dashboard hidden" id="dashboard">
<h2>Enquiries Dashboard</h2>

<div class="top-tools">

<input type="text" id="searchBox" placeholder="Search enquiries..." onkeyup="filterRows()">

<button onclick="exportCSV()">Export CSV</button>

</div>

<table id="dataTable">
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Company</th>
<th>Email</th>
<th>Phone</th>
<th>Message</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
const PASSCODE = "outreach2026";
const API = "https://script.google.com/macros/s/AKfycbyfZPVkYcF8GAvQnV4cBrToJTvzmOOgteOjSNm2Aqpj2YrFECcaLu0N7HoIWmVPlIgk/exec";

function login(){
const val = document.getElementById("pass").value;

if(val === PASSCODE){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
loadData();
}else{
alert("Wrong passcode");
}
}

function loadData(){

fetch(API)
.then(r => r.json())
.then(rows => {

rows.reverse();

const body = document.querySelector("#dataTable tbody");

rows.forEach(row => {

body.innerHTML += `
<tr>
<td>${row[0]}</td>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${row[3]}</td>
<td>${row[4]}</td>
<td>${row[5]}</td>
</tr>
`;

});

});

}
function filterRows(){

const val = document
.getElementById("searchBox")
.value
.toLowerCase();

const rows = document.querySelectorAll("#dataTable tbody tr");

rows.forEach(row => {

const text = row.innerText.toLowerCase();

row.style.display = text.includes(val)
? ""
: "none";

});

}

function exportCSV(){

let csv = [];

const rows = document.querySelectorAll("#dataTable tr");

rows.forEach(row => {

let cols = row.querySelectorAll("th, td");
let data = [];

cols.forEach(col => {
data.push('"' + col.innerText.replace(/"/g,'""') + '"');
});

csv.push(data.join(","));

});

const blob = new Blob(
[csv.join("\n")],
{ type:"text/csv" }
);

const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;
a.download = "enquiries.csv";
a.click();

window.URL.revokeObjectURL(url);

}z
</script>

</body>
</html>
